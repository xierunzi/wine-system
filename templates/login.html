<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hustle Bar - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 35px;
            border-bottom: 2px solid #f0c413;
            display: inline-block;
            padding-bottom: 5px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.2s;
            background: #f8f9fa;
        }
        .input-group input:focus {
            outline: none;
            border-color: #f0c413;
            background: white;
            box-shadow: 0 0 0 3px rgba(240,196,19,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #f0c413;
            color: #1a1a2e;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn:active {
            transform: scale(0.97);
            background: #e0b010;
        }
        .btn-secondary {
            background: #2c3e50;
            color: white;
            margin-top: 12px;
        }
        .btn-secondary:active {
            background: #1a2a3a;
        }
        .divider {
            margin: 25px 0 15px;
            position: relative;
            text-align: center;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #999;
            font-size: 13px;
        }
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .footer {
            margin-top: 25px;
            color: #999;
            font-size: 12px;
        }
        .role-badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 8px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🥃</div>
        <h1>HUSTLE BAR</h1>
        <div class="subtitle">会员积分系统</div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label>📇 姓名</label>
                <input type="text" name="name" placeholder="请输入您的姓名" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label>📱 手机尾号</label>
                <input type="text" name="phone_tail" placeholder="请输入4位手机尾号" maxlength="4" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label>🔑 管理密码 <span style="color:#999; font-size:12px;">(仅员工需填写)</span></label>
                <input type="password" name="password" placeholder="员工请输入管理密码">
            </div>

            <button type="submit" class="btn">🔓 登录系统</button>
        </form>

        <div class="divider">
            <span>⊕</span>
        </div>

        <div class="role-badge">
            💡 顾客只需填写姓名和手机尾号 | 员工请输入管理密码
        </div>

        <div class="footer">
            Hustle Bar · 会员专属
        </div>
    </div>
</body>
</html>
